# Site settings
title: "Your Name"
name: "Your Name"
description: "Personal academic website — research, publications, and teaching."
url: "https://klgorski.github.io"
baseurl: ""
locale: "en-US"
repository: "klgorski/klgorski.github.io"

# Theme (built natively by GitHub Pages via jekyll-remote-theme)
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default" # "air", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Author profile (shown in the sidebar)
author:
  name: "Your Name"
  avatar: "/assets/images/avatar.png"
  bio: "Undergraduate at UC San Diego studying [your major]. Interested in [your research area]."
  location: "San Diego, CA"
  email: "kgorski@ucsd.edu"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:kgorski@ucsd.edu"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/klgorski"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Reading files
include:
  - _pages

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true

# Outputting
permalink: /:categories/:title/
timezone: America/Los_Angeles

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .github
